name: Build TNT Warner

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build mod
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: tntwarner-jar
          path: build/libs/*.jar
